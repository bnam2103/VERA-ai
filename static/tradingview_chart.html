<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingView Chart</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #05080e;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    .chart-shell {
      width: 100%;
      height: 100%;
      background: #05080e;
    }

    .tradingview-widget-container,
    .tradingview-widget-container__widget {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="chart-shell">
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget" id="tv-chart"></div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const symbol = params.get("symbol") || "NASDAQ:AAPL";
    const interval = params.get("interval") || "D";

    const script = document.createElement("script");
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
    script.async = true;
    script.type = "text/javascript";
    script.text = JSON.stringify({
      autosize: true,
      symbol,
      interval,
      timezone: "Etc/UTC",
      theme: "dark",
      style: "1",
      locale: "en",
      allow_symbol_change: true,
      hide_top_toolbar: false,
      hide_side_toolbar: true,
      withdateranges: true,
      saveimage: false,
      calendar: false,
      support_host: "https://www.tradingview.com"
    });

    document.querySelector(".tradingview-widget-container").appendChild(script);
  </script>
</body>
</html>
